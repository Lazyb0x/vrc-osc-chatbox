version: 1
disable_existing_loggers: false
formatters:
  simple:
    format: "%(asctime)s.%(msecs)03d %(levelname)8s: [%(name)s]\t%(message)s"
    datefmt: "%Y/%m/%d %H:%M:%S"
  proxy-output:
    format: "%(message)s"
    datefmt: "%Y/%m/%d %H:%M:%S"
  colored:
    (): colorlog.ColoredFormatter
    format: "%(asctime)s.%(msecs)03d %(log_color)s%(levelname)8s%(reset)s: %(cyan)s[%(name)s]%(reset)s %(message)s"
    datefmt: "%Y/%m/%d %H:%M:%S"
handlers:
  console_handler:
    class: logging.StreamHandler
    formatter: colored
    level: INFO

root:
  level: INFO
  handlers: [console_handler]
loggers:
  vrcchatbox:
    level: DEBUG
    handlers: [console_handler]
    propagate: false
  openai:
    level: WARNING
  httpx:
    level: WARNING
