[project]
name = "vrc-osc-chatbox"
version = "0.1.0"
description = "A simple command line chatbox input interface for VRChat using OSC."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "python-osc>=1.9.3",
    "fastapi>=0.104.1",
    "uvicorn[standard]>=0.24.0",
    "langchain>=1.2.13",
    "langchain-openai>=1.1.11",
    "colorlog>=6.8.0",
    "ruamel.yaml>=0.18.0",
]

[project.scripts]
vrc-chatbox = "main:main"

[dependency-groups]
dev = [
    "ipykernel>=7.2.0",
]
